function interleaveBySubject(items){
  const groups={}, order=[];
  items.forEach(it=>{
    if(!groups[it.subj]){groups[it.subj]=[];order.push(it.subj);}
    groups[it.subj].push(it);
  });
  const keyed=[];
  order.forEach(subj=>{
    const g=groups[subj], n=g.length;
    g.forEach((it,j)=>{ keyed.push({key:(j+0.5)/n, orderIdx:order.indexOf(subj), item:it}); });
  });
  keyed.sort((a,b)=> a.key-b.key || a.orderIdx-b.orderIdx);
  return keyed.map(k=>k.item);
}

function addDays(dateStr,n){
  const [y,m,d]=dateStr.split("-").map(Number);
  const dt=new Date(y, m-1, d);
  dt.setDate(dt.getDate()+n);
  const yy=dt.getFullYear(), mm=String(dt.getMonth()+1).padStart(2,"0"), dd=String(dt.getDate()).padStart(2,"0");
  return yy+"-"+mm+"-"+dd;
}
function dateDiffDays(a,b){return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000);}

    } else if(date===ROUTINE_END){
      dayObj.sessions.push({subj:"সব বিষয়",topic:"চূড়ান্ত রিভিশন",type:"revision",icon:"🎯"});
    } else if(topicIdx<NEW_TOPICS.length){
      for(let s=0;s<2 && topicIdx<NEW_TOPICS.length;s++){
        const t=NEW_TOPICS[topicIdx++];
        dayObj.sessions.push({subj:t.subj,topic:t.topic,type:"new",icon:t.icon,hard:!!t.hard});
      }
    } else {
      for(let s=0;s<2;s++){
        const r=REV_SUBJECTS[revIdx%REV_SUBJECTS.length];revIdx++;
        dayObj.sessions.push({subj:r.subj,topic:r.subj+" — রিভিশন",type:"revision",icon:r.icon});
      }
    }
    plan.push(dayObj);
  }
  return plan;
}

function getTodayIndex(){
  const ti = PLAN.findIndex(d=>isToday(d.date));

/* ============= STATE ============= */
let tutorState = { xp:0, streak:0, lastActiveDate:null, weakTopics:[], bookmarks:[], apiKey:"", chats:{} };

function loadState(){
  try{ tutorState = {...tutorState, ...JSON.parse(localStorage.getItem(TUTOR_STORAGE_KEY)||"{}")}; }catch{}
}
function saveState(){ try{ localStorage.setItem(TUTOR_STORAGE_KEY, JSON.stringify(tutorState)); }catch{} }

function getPlannerDone(){
  try{ return JSON.parse(localStorage.getItem(PLANNER_STORAGE_KEY)||"{}"); }catch{ return {}; }
}

function updateStreak(){
  const today = new Date().toDateString();
  if(tutorState.lastActiveDate === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  tutorState.streak = (tutorState.lastActiveDate === y.toDateString()) ? tutorState.streak+1 : 1;
  tutorState.lastActiveDate = today;
  saveState();
}
function addXp(n){ tutorState.xp += n; saveState(); renderHome(); }

let currentView="home";
let currentChapter=null; // for learn detail
let activePracticeTopic=null; // {subj,topic}
let activeChatKey=null;

function setView(v){
  currentView=v;
  ["home","learn","practice","progress","settings"].forEach(x=>{
    document.getElementById("view"+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle("hidden", x!==v);
  });
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    const views=["home","learn","practice","progress","settings"];
    b.className="tab-btn "+(views[i]===v?"tab-active":"tab-inactive");
  });
  if(v==="home")renderHome();
  if(v==="learn")renderLearnList();
  if(v==="practice")renderPracticeHome();
  if(v==="progress")renderProgress();
  if(v==="settings")renderSettings();
}

/* ============= HOME ============= */
function renderHome(){
  const ti = getTodayIndex();
  const today = PLAN[ti];
  const done = getPlannerDone();
  const doneCountToday = today.sessions.filter((_,si)=>done[ti+"-"+si]).length;
  document.getElementById("streakNum").textContent = tutorState.streak;

  let html = '<div class="card"><div class="card-title">📅 আজকের বিষয় ও অধ্যায়</div>';
  today.sessions.forEach((s)=>{
    const col = dotColor(s.subj);
    html += '<div class="today-subj-card" style="border-color:'+col+'44">';
    html += '<div class="today-subj-left"><div class="today-subj-name" style="color:'+col+'">'+s.icon+' '+s.subj+'</div>';
    html += '<div class="today-subj-topic">'+s.topic+'</div></div>';
    html += '<button class="today-subj-btn" onclick="openLearnFor(\''+encodeURIComponent(s.topic)+'\',\''+encodeURIComponent(s.subj)+'\')">শিখি</button>';
    html += '</div>';
  });
  html += '<div style="font-size:10.5px;color:#64748b;margin-top:4px">আজকের '+today.sessions.length+'টির মধ্যে '+doneCountToday+'টি Study Planner-এ সম্পন্ন দেখাচ্ছে।</div>';

function getDailyChallenge(ti){
  const today = PLAN[ti];
  const seedDate = today.date;
  let seed=0; for(let i=0;i<seedDate.length;i++) seed += seedDate.charCodeAt(i);
  const challenges = [
    "আজকের যেকোনো ১টা অধ্যায়ের ৩টা গুরুত্বপূর্ণ পয়েন্ট নিজের ভাষায় লিখে ফেলো।",
    "একটা কঠিন (⭐) টপিক বেছে নিয়ে AI Question Mode-এ ৩টা প্রশ্নের উত্তর দাও।",
    "আজকের যেকোনো অধ্যায়ের Difficult Words গুলো পড়ে মুখস্থ করো।",
    "Self-Explanation Mode ব্যবহার করে আজকের ১টা টপিক নিজের ভাষায় ব্যাখ্যা করো।",
    "আজকের একটা টপিক নিয়ে একটা সৃজনশীল প্রশ্নের (CQ) উত্তর লেখার চেষ্টা করো।"

  return "🎯 "+challenges[seed % challenges.length];

  const {subj, topic, mode} = activePracticeTopic;

    html += '<div class="chat-input-row"><textarea id="chatInput" rows="1" placeholder="তোমার উত্তর বা প্রশ্ন লেখো..."></textarea><button class="send-btn" onclick="sendPractice()">➤</button></div>';

  } else if(mode==='question'){
    quick.innerHTML = ['৫টা MCQ দাও','১টা সৃজনশীল (CQ) প্রশ্ন দাও','সহজ প্রশ্ন দাও'].map(q=>'<button class="quick-btn" onclick="quickSend(\''+q+'\')">'+q+'</button>').join("");

function seedInitialMessage(){
  const {subj, topic, mode} = activePracticeTopic;
  let teacherLine = "";
  if(mode==='conversation') teacherLine = "আজ আমরা \""+topic+"\" অধ্যায়টি শিখব। তুমি কি প্রস্তুত? 😊";
  else if(mode==='question') teacherLine = "\""+topic+"\" থেকে প্রশ্ন শুরু করি? নিচের বাটন থেকে বেছে নাও, বা নিজে লেখো কী ধরনের প্রশ্ন চাও।";
  else teacherLine = "\""+topic+"\" নিয়ে তুমি যা বুঝেছ, নিজের ভাষায় লিখে ফেলো। আমি সেটা যাচাই করে দেখিয়ে দেব কোথায় ঠিক আছে, কোথায় উন্নতি করা যায়।";

  renderChatMessages();
}

function renderChatMessages(){
  const box=document.getElementById("chatBox");
  const msgs = tutorState.chats[activeChatKey]||[];
  box.innerHTML = msgs.map(m=>'<div class="chat-msg '+m.role+'">'+escapeHtml(m.text)+'</div>').join("");
  box.scrollTop = box.scrollHeight;
}
function escapeHtml(str){ const d=document.createElement('div'); d.textContent=str; return d.innerHTML; }

function clearChat(){
  if(confirm('এই চ্যাট মুছে ফেলতে চাও?')){
    tutorState.chats[activeChatKey]=[];
    saveState();
    renderChatUI();
  }
}

function quickSend(text){
  document.getElementById("chatInput").value = text;
  sendPractice();
}

async function sendPractice(){
  const input = document.getElementById("chatInput");
  const text = input.value.trim();
  if(!text) return;
  const {subj, topic, mode} = activePracticeTopic;

  tutorState.chats[activeChatKey].push({role:'user', text});
  input.value="";
  saveState(); renderChatMessages();

  if(!tutorState.apiKey){
    tutorState.chats[activeChatKey].push({role:'teacher', text:"⚠️ AI ফিচার ব্যবহার করতে ⚙️ Settings ট্যাবে গিয়ে একটা ফ্রি Gemini API Key বসাও। Key ছাড়া Learn Mode-এর নোট পড়ে অফলাইনে প্র্যাকটিস করতে পারো।"});
    saveState(); renderChatMessages();
    return;
  }

  const box=document.getElementById("chatBox");
  box.insertAdjacentHTML('beforeend','<div class="chat-msg ai loading" id="loadingBubble">শিক্ষক ভাবছেন...</div>');
  box.scrollTop = box.scrollHeight;

  try{
    const reply = await callGemini(buildSystemPrompt(subj, topic, mode), tutorState.chats[activeChatKey]);
    document.getElementById('loadingBubble')?.remove();
    tutorState.chats[activeChatKey].push({role:'ai', text:reply});
    if(mode==='question') maybeExtractWeakTopic(subj, topic, reply);
    addXp(2);
  }catch(e){
    document.getElementById('loadingBubble')?.remove();
    tutorState.chats[activeChatKey].push({role:'teacher', text:"⚠️ সমস্যা হয়েছে: "+e.message+"\n\n⚙️ Settings ট্যাবে গিয়ে 'Test Connection' চেপে দেখো Key ঠিক আছে কিনা।"});
  }
  saveState(); renderChatMessages();
}

function maybeExtractWeakTopic(subj, topic, reply){
  const lower = reply.toLowerCase();
  if(lower.includes('ভুল') || lower.includes('উন্নতি') || lower.includes('❌')){
    const exists = tutorState.weakTopics.find(w=>w.subj===subj && w.topic===topic);
    if(!exists){ tutorState.weakTopics.unshift({subj, topic, date:new Date().toISOString()}); saveState(); }
  }
}

function buildSystemPrompt(subj, topic, mode){
  const base = "তুমি একজন অভিজ্ঞ, ধৈর্যশীল, উৎসাহদায়ক বাংলাদেশি AI শিক্ষক। ছাত্র/ছাত্রী ৯ম শ্রেণির মানবিক বিভাগে পড়ে এবং শুধুমাত্র এই অধ্যায় নিয়ে কথা বলছে — বিষয়: \""+subj+"\", অধ্যায়/টপিক: \""+topic+"\"। উত্তর সবসময় বাংলায়, সহজ ভাষায়, ছোট ও স্পষ্ট রাখো (মোবাইল স্ক্রিনে পড়তে হবে)।";
  if(mode==='conversation'){
    return base + " তুমি একজন বাস্তব শিক্ষকের মতো ধাপে ধাপে কথোপকথন চালাবে — যেমন: 'আজ আমরা এই অধ্যায়টি শিখব', 'তুমি কি প্রস্তুত?', 'এই অংশটি বুঝেছ?', 'চমৎকার! এবার একটি প্রশ্ন করি', 'ভালো হয়েছে, তবে এই অংশে আরও উন্নতি করা যায়'— এই ধরনের উৎসাহব্যঞ্জক ও ধাপে ধাপে সংলাপ ব্যবহার করবে। প্রতিটি জবাবের পর ছাত্রকে পরের ধাপে এগিয়ে নেবে।";
  }
  if(mode==='question'){
    return base + " ছাত্র যা চায় (MCQ/সৃজনশীল/সংক্ষিপ্ত/সত্য-মিথ্যা ইত্যাদি) সেই ধরনের বোর্ড পরীক্ষার মানের প্রশ্ন তৈরি করবে, শুধু এই টপিক থেকেই। সৃজনশীল প্রশ্ন (CQ) চাইলে ক) জ্ঞানমূলক, খ) অনুধাবনমূলক, গ) প্রয়োগমূলক, ঘ) উচ্চতর দক্ষতামূলক — এই চার অংশে তৈরি করবে। ছাত্র উত্তর দিলে প্রতিটি অংশ আলাদা মূল্যায়ন করবে: ✔ কী ঠিক হয়েছে, ❌ কোথায় ভুল, 📌 কী বাদ গেছে, 📝 Model Answer সংক্ষেপে, ⭐ নম্বর, 💬 উন্নতির পরামর্শ। একই প্রশ্ন বারবার করবে না, প্রতিবার নতুন প্রশ্ন দেবে।";
  }
  if(mode==='selfexplain'){
    return base + " ছাত্র নিজের ভাষায় লিখবে সে কী বুঝেছে। তুমি বিশ্লেষণ করবে: ✔ কোন অংশ সঠিক, ❌ কোন অংশ ভুল, 📌 কী বাদ গেছে, কীভাবে আরও ভালো লেখা যায় — তারপর একটা সংক্ষিপ্ত সুন্দর Model Explanation দেখাবে।";
  }
  return base;
}

/* ============= GEMINI API ============= */
const GEMINI_MODEL = "gemini-2.5-flash";
async function callGemini(systemPrompt, chatHistory){
  const contents = chatHistory.filter(m=>m.role==='user'||m.role==='ai').slice(-16).map(m=>({
    role: m.role==='user' ? 'user' : 'model', parts:[{text:m.text}]
  }));
  const url = 'https://generativelanguage.googleapis.com/v1beta/models/'+GEMINI_MODEL+':generateContent?key='+encodeURIComponent(tutorState.apiKey);
  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(), 25000);
  let res;
  try{
    res = await fetch(url, {
      method:'POST', headers:{'Content-Type':'application/json'}, signal:controller.signal,
      body: JSON.stringify({ systemInstruction:{parts:[{text:systemPrompt}]}, contents })
    });
  }catch(e){
    clearTimeout(timeout);
    if(e.name==='AbortError') throw new Error('সময় শেষ (Timeout) — ইন্টারনেট চেক করো।');
    throw new Error('নেটওয়ার্ক সমস্যা — ইন্টারনেট কানেকশন চেক করো।');
  }
  clearTimeout(timeout);
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    const msg = (data && data.error && data.error.message) ? data.error.message : ('HTTP '+res.status);
    throw new Error(msg);
  }
  const parts = data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
  if(!parts) throw new Error('AI থেকে কোনো উত্তর পাওয়া যায়নি (খালি রেসপন্স)।');
  return parts.map(p=>p.text||"").join("");
}

  html += '<div class="card stat-box"><div class="stat-num">🔥 '+tutorState.streak+'</div><div class="stat-lbl">দিন স্ট্রিক</div></div>';
  html += '<div class="card stat-box"><div class="stat-num">⭐ '+tutorState.xp+'</div><div class="stat-lbl">মোট XP</div></div>';
  html += '<div class="card stat-box"><div class="stat-num">'+doneCount+'</div><div class="stat-lbl">Planner সম্পন্ন সেশন</div></div>';
  html += '<div class="card stat-box"><div class="stat-num">'+tutorState.weakTopics.length+'</div><div class="stat-lbl">দুর্বল টপিক</div></div>';
  html += '</div>';

  html += '<div class="card"><div class="card-title">📉 দুর্বল টপিক (ভুল হওয়া উত্তর থেকে)</div>';
  if(tutorState.weakTopics.length===0){
    html += '<div class="body-text">এখনো কোনো দুর্বল টপিক চিহ্নিত হয়নি। প্র্যাকটিস মোডে প্রশ্নের উত্তর দিলে এখানে যোগ হবে।</div>';
  } else {
    tutorState.weakTopics.slice(0,10).forEach((w,i)=>{
      html += '<div class="weak-item"><div class="wi-subj">'+w.subj+'</div><div class="wi-topic">'+w.topic+'</div>';
      html += '<button class="mode-btn" style="margin-top:6px;width:100%" onclick="startPractice(\''+encodeURIComponent(w.subj)+'\',\''+encodeURIComponent(w.topic)+'\',\'question\')">🔁 আবার প্র্যাকটিস করো</button></div>';
    });
  }
  html += '</div>';

  html += '<div class="card"><div class="card-title">📊 Study Analytics</div>';
  html += '<div class="body-text">বিস্তারিত সাপ্তাহিক/মাসিক চার্ট শীঘ্রই যোগ করা হবে। আপাতত উপরের সংখ্যাগুলো থেকে তোমার সামগ্রিক অগ্রগতি বোঝা যাচ্ছে।</div></div>';

  document.getElementById("viewProgress").innerHTML = html;
}

/* ============= SETTINGS ============= */
function renderSettings(){
  let html = '<div class="settings-box">';
  html += '<h3>🔑 Gemini API Key</h3>';
  html += '<p>AI ফিচার (Smart Conversation, প্রশ্ন তৈরি, মূল্যায়ন) ব্যবহার করতে একটা ফ্রি Gemini API Key লাগবে।<br><a href="https://aistudio.google.com/apikey" target="_blank">এখান থেকে ফ্রি Key নাও</a>।</p>';
  html += '<input type="text" class="key-input" id="keyInput" placeholder="তোমার Gemini API Key পেস্ট করো" value="'+(tutorState.apiKey||"")+'">';
  html += '<button class="key-btn save" onclick="saveKey()">সংরক্ষণ করো</button>';
  html += '<button class="key-btn test" onclick="testConnection()">🔍 Test Connection</button>';
  html += '<div id="testStatus"></div>';
  html += '</div>';
  document.getElementById("viewSettings").innerHTML = html;
}

function saveKey(){
  const val = document.getElementById("keyInput").value.trim();
  tutorState.apiKey = val; saveState();
  document.getElementById("testStatus").innerHTML = '<div class="status-line status-ok">✅ Key সংরক্ষণ করা হয়েছে। এখন Test Connection চেপে যাচাই করো।</div>';
}

async function testConnection(){
  const statusEl = document.getElementById("testStatus");
  if(!tutorState.apiKey){ statusEl.innerHTML='<div class="status-line status-bad">⚠️ আগে একটা Key বসাও ও Save করো।</div>'; return; }
  statusEl.innerHTML = '<div class="status-line">🔄 চেক করা হচ্ছে...</div>';
  try{
    const reply = await callGemini("তুমি একটা সংযোগ পরীক্ষা করছ। শুধু লেখো: 'সংযোগ সফল ✅'", [{role:'user', text:'test'}]);
    statusEl.innerHTML = '<div class="status-line status-ok">✅ Key কাজ করছে! AI উত্তর দিয়েছে: '+escapeHtml(reply.slice(0,120))+'</div>';
  }catch(e){
    statusEl.innerHTML = '<div class="status-line status-bad">❌ সমস্যা হয়েছে: '+escapeHtml(e.message)+'<br><br>সম্ভাব্য কারণ: ভুল Key, অথবা Google AI Studio-তে Key-টা এখনো Active হয়নি, অথবা ইন্টারনেট সমস্যা।</div>';
  }
}

function init(){
  loadState();
  updateStreak();
  renderHome();
}
init();
